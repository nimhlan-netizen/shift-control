services:
  # --------------------------------------------------------
  # Frontend: Shift Control Chat UI
  # --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    container_name: shift-control-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - n8n

  # --------------------------------------------------------
  # Workflow Engine: n8n
  # --------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: shift-control-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin}
      - WEBHOOK_URL=http://${DOMAIN_NAME:-localhost}:5678/
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
      - local_media:/media # For local media ingestion if needed
    depends_on:
      postgres:
        condition: service_healthy

  # --------------------------------------------------------
  # Database: PostgreSQL (for n8n)
  # --------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: shift-control-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}' ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n8n_data:
  postgres_data:
  local_media:
