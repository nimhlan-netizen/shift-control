services:
  # --------------------------------------------------------
  # Frontend: Shift Control Chat UI
  # --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    container_name: shift-control-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
